services:
  redis:
    image: redis/redis-stack-server:7.2.0-v16
    container_name: redis
    ports:
      - '6379:6379'
    environment:
      REDIS_ARGS: >-
        --requirepass 1213
        --appendonly yes
        --save 60 10000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '1213', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
